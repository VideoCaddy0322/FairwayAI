<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080c0a">
<title>FairwayAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #080c0a;
  --surface: #0f1712;
  --surface2: #162019;
  --surface3: #1c2b22;
  --green: #1db954;
  --green-dim: #148a3d;
  --green-glow: rgba(29,185,84,0.35);
  --orange: #ff6b1a;
  --orange-glow: rgba(255,107,26,0.35);
  --red: #e63946;
  --text: #eef4f0;
  --text-dim: #6b8f74;
  --text-muted: #3d5944;
  --border: rgba(29,185,84,0.15);
  --border-bright: rgba(29,185,84,0.4);
  --radius: 16px;
  --radius-sm: 10px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  overflow: hidden;
  user-select: none;
}

#app {
  width: 100%;
  height: 100%;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  display: flex;
  flex-direction: column;
  background: var(--bg);
}

/* ── VIEWFINDER ── */
#viewfinder {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #050a07;
}

.vf-scene {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 25% 55%, rgba(18,52,26,0.9) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 35%, rgba(12,36,18,0.7) 0%, transparent 50%),
    linear-gradient(180deg, #0a1a0e 0%, #06100a 55%, #030806 100%);
}

.vf-ground {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 42%;
  background: linear-gradient(180deg, #172b1c 0%, #0e1f12 100%);
  border-top: 1px solid rgba(30,80,40,0.25);
}

.vf-sky-glow {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(180deg, rgba(135,190,155,0.08) 0%, transparent 100%);
}

/* ── FRAMING GUIDES ── */
#guides {
  position: absolute;
  inset: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.guide-thirds-h {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: rgba(29,185,84,0.18);
}
.guide-thirds-h:nth-child(1) { top: 33.3%; }
.guide-thirds-h:nth-child(2) { top: 66.6%; }

.guide-thirds-v {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: rgba(29,185,84,0.18);
}
.guide-thirds-v:nth-child(3) { left: 33.3%; }
.guide-thirds-v:nth-child(4) { left: 66.6%; }

.guide-golfer {
  position: absolute;
  left: 12%;
  top: 18%;
  width: 32%;
  height: 78%;
  border: 1.5px solid rgba(29,185,84,0.5);
  border-radius: 4px;
}

.guide-golfer::before {
  content: 'SUBJECT';
  position: absolute;
  top: -18px; left: 0;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--green);
  opacity: 0.7;
}

.g-corner {
  position: absolute;
  width: 14px; height: 14px;
  border-color: var(--green);
  border-style: solid;
}
.g-corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.g-corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
.g-corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
.g-corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

.guide-target {
  position: absolute;
  left: 30%;
  top: 25%;
  bottom: 0;
  width: 1px;
  background: linear-gradient(180deg, transparent, rgba(255,107,26,0.4), rgba(255,107,26,0.7));
}

.guide-target::before {
  content: '▼ PIN';
  position: absolute;
  top: -18px; left: 4px;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--orange);
  white-space: nowrap;
}

/* ── HOLE INDICATOR (top overlay) ── */
#hole-indicator {
  position: absolute;
  top: 14px;
  left: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 10;
}

.hole-pill {
  background: rgba(8,12,10,0.82);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border-bright);
  border-radius: 30px;
  padding: 6px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: all 0.2s;
}

.hole-pill:active { transform: scale(0.95); }

.hole-pill-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
}

.hole-pill-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  color: var(--text);
  line-height: 1;
}

.hole-pill-meta {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.hole-pill-par {
  font-size: 10px;
  font-weight: 600;
  color: var(--green);
}

.hole-pill-yds {
  font-size: 10px;
  color: var(--text-dim);
}

.edit-hole-btn {
  background: rgba(8,12,10,0.75);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
}

.edit-hole-btn:active { background: var(--surface2); color: var(--text); }

/* ── GEO TAGS (camera overlay) ── */
#geo-overlay {
  position: absolute;
  bottom: 14px;
  left: 14px;
  right: 14px;
  display: flex;
  gap: 10px;
  z-index: 10;
}

.geo-tag-btn {
  flex: 1;
  background: rgba(8,12,10,0.82);
  backdrop-filter: blur(12px);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}

.geo-tag-btn:active { transform: scale(0.96); }

.geo-tag-btn.tagged {
  border-color: var(--green);
  background: rgba(29,185,84,0.12);
}

.geo-tag-icon { font-size: 20px; flex-shrink: 0; }

.geo-tag-info { flex: 1; min-width: 0; }

.geo-tag-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  text-transform: uppercase;
}

.geo-tag-btn.tagged .geo-tag-label { color: var(--green); }

.geo-tag-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  line-height: 1.1;
  transition: color 0.3s;
}

.geo-tag-btn.tagged .geo-tag-value { color: var(--orange); }

/* Distance display between geo tags */
#dist-display {
  position: absolute;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(8,12,10,0.88);
  backdrop-filter: blur(12px);
  border: 1px solid var(--orange);
  border-radius: 30px;
  padding: 6px 18px;
  display: flex;
  align-items: baseline;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.4s, transform 0.4s;
  transform: translateX(-50%) translateY(10px);
  z-index: 10;
  pointer-events: none;
}

#dist-display.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.dist-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  color: var(--orange);
  letter-spacing: 1px;
  line-height: 1;
}

.dist-unit-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
}

/* ── CAMERA CONTROLS ── */
#camera-controls {
  background: rgba(8,12,10,0.96);
  border-top: 1px solid var(--border);
  padding: 16px 24px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  z-index: 20;
}

.ctrl-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  transition: all 0.2s;
  color: var(--text-dim);
}

.ctrl-btn:active { transform: scale(0.9); background: var(--surface3); }

.ctrl-btn.active-btn {
  border-color: var(--green);
  color: var(--green);
}

/* Record button */
#record-btn {
  width: 76px;
  height: 76px;
  border-radius: 50%;
  background: transparent;
  border: 3px solid rgba(255,255,255,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  transition: all 0.2s;
}

#record-btn:active { transform: scale(0.93); }

#record-inner {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: var(--red);
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 0 20px rgba(230,57,70,0.5);
}

#record-btn.recording #record-inner {
  border-radius: 10px;
  width: 30px;
  height: 30px;
}

.rec-timer {
  position: absolute;
  top: -28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  font-weight: 700;
  color: var(--red);
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.3s;
  display: flex;
  align-items: center;
  gap: 5px;
}

#record-btn.recording .rec-timer { opacity: 1; }

.rec-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--red);
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

/* ── DATA SHEET (slides up) ── */
#data-sheet-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s;
}

#data-sheet-overlay.open {
  opacity: 1;
  pointer-events: all;
}

#data-sheet {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border-bright);
  border-radius: 24px 24px 0 0;
  padding: 0 0 40px;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
  max-height: 88vh;
  overflow-y: auto;
}

#data-sheet-overlay.open #data-sheet {
  transform: translateY(0);
}

.sheet-handle {
  width: 40px; height: 4px;
  background: var(--text-muted);
  border-radius: 2px;
  margin: 14px auto 20px;
}

.sheet-header {
  padding: 0 20px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.sheet-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 1.5px;
  color: var(--text);
}

.sheet-hole-badge {
  background: var(--surface2);
  border: 1px solid var(--border-bright);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--green);
}

.sheet-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.sheet-section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* Score input */
.score-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.score-label {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-dim);
}

.score-stepper {
  display: flex;
  align-items: center;
  gap: 16px;
}

.step-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  color: var(--text-dim);
  transition: all 0.15s;
}

.step-btn:active { transform: scale(0.88); background: var(--surface3); }

.score-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  color: var(--text);
  min-width: 36px;
  text-align: center;
  line-height: 1;
}

/* Three-option selector (FIR/GIR) */
.tri-selector {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.tri-btn {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  transition: all 0.15s;
}

.tri-btn:active { transform: scale(0.94); }

.tri-btn.selected {
  border-color: var(--green);
  background: rgba(29,185,84,0.1);
}

.tri-btn.selected-miss {
  border-color: var(--orange);
  background: rgba(255,107,26,0.1);
}

.tri-icon { font-size: 18px; }
.tri-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--text-dim);
  text-transform: uppercase;
}

.tri-btn.selected .tri-label { color: var(--green); }
.tri-btn.selected-miss .tri-label { color: var(--orange); }

/* Five-option selector for GIR misses */
.five-selector {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin-top: 8px;
}

/* Club chips */
.chip-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.chip-scroll::-webkit-scrollbar { display: none; }

.chip {
  flex-shrink: 0;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.chip:active { transform: scale(0.94); }
.chip.selected {
  background: var(--green-dim);
  border-color: var(--green);
  color: white;
  font-weight: 600;
}

/* Shot rows */
.shot-rows { display: flex; flex-direction: column; gap: 10px; }

.shot-row {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.shot-row-num {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--surface3);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--green);
  flex-shrink: 0;
}

.shot-row-fields {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.shot-row-label {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 500;
}

/* Lie selector */
.lie-selector {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.lie-chip {
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
}

.lie-chip:active { transform: scale(0.94); }
.lie-chip.selected {
  border-color: var(--orange);
  color: var(--orange);
  background: rgba(255,107,26,0.08);
}

/* Save button */
.save-btn {
  margin: 16px 20px 0;
  padding: 15px;
  background: var(--green-dim);
  border: none;
  border-radius: var(--radius);
  color: white;
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.2s;
  box-shadow: 0 4px 24px var(--green-glow);
  width: calc(100% - 40px);
}

.save-btn:active { transform: scale(0.97); background: #0f6e2e; }

/* ── HOLE EDIT SHEET ── */
#hole-sheet-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  z-index: 60;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  display: flex;
  align-items: flex-end;
}

#hole-sheet-overlay.open {
  opacity: 1;
  pointer-events: all;
}

#hole-sheet {
  width: 100%;
  background: var(--surface);
  border-top: 1px solid var(--border-bright);
  border-radius: 24px 24px 0 0;
  padding: 0 20px 48px;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
}

#hole-sheet-overlay.open #hole-sheet {
  transform: translateY(0);
}

.hole-grid {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 6px;
  margin-top: 8px;
}

.hole-cell {
  aspect-ratio: 1;
  border-radius: 8px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
}

.hole-cell:active { transform: scale(0.9); }

.hole-cell.current {
  background: var(--green-dim);
  border-color: var(--green);
  color: white;
}

.hole-cell-info {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}

.hole-cell-par {
  font-size: 8px;
  font-weight: 500;
  opacity: 0.7;
}

/* ── DATA BUTTON (floating) ── */
#data-fab {
  position: absolute;
  top: 14px;
  right: 14px;
  background: rgba(8,12,10,0.82);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  transition: all 0.2s;
  z-index: 10;
}

#data-fab:active { transform: scale(0.94); }

#data-fab.has-data {
  border-color: var(--green);
}

.fab-icon { font-size: 14px; }
.fab-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--text-dim);
  text-transform: uppercase;
}

#data-fab.has-data .fab-label { color: var(--green); }

/* ── TOAST ── */
#toast {
  position: fixed;
  top: 72px;
  left: 50%;
  transform: translateX(-50%) translateY(-8px);
  background: var(--surface2);
  border: 1px solid var(--green);
  border-radius: 30px;
  padding: 8px 18px;
  font-size: 13px;
  font-weight: 600;
  color: var(--green);
  opacity: 0;
  transition: all 0.3s;
  z-index: 999;
  white-space: nowrap;
  pointer-events: none;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

#toast.warn {
  border-color: var(--orange);
  color: var(--orange);
}

/* ── PULSE ANIMATION ── */
@keyframes geo-pulse {
  0% { box-shadow: 0 0 0 0 var(--green-glow); }
  70% { box-shadow: 0 0 0 12px transparent; }
  100% { box-shadow: 0 0 0 0 transparent; }
}

.pulse-once { animation: geo-pulse 0.6s ease; }

/* ── RECORDED CLIPS INDICATOR ── */
#clips-indicator {
  position: absolute;
  bottom: 105px;
  right: 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: flex-end;
  z-index: 10;
}

.clip-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 6px rgba(230,57,70,0.6);
  animation: fadeInDot 0.3s ease;
}

@keyframes fadeInDot {
  from { opacity: 0; transform: scale(0); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>
<body>
<div id="app">

  <!-- VIEWFINDER -->
  <div id="viewfinder">
    <div class="vf-scene"></div>
    <div class="vf-sky-glow"></div>
    <div class="vf-ground"></div>

    <!-- Framing guides -->
    <div id="guides">
      <div class="guide-thirds-h"></div>
      <div class="guide-thirds-h"></div>
      <div class="guide-thirds-v"></div>
      <div class="guide-thirds-v"></div>
      <div class="guide-golfer">
        <div class="g-corner tl"></div>
        <div class="g-corner tr"></div>
        <div class="g-corner bl"></div>
        <div class="g-corner br"></div>
      </div>
      <div class="guide-target"></div>
    </div>

    <!-- Hole indicator -->
    <div id="hole-indicator">
      <div class="hole-pill" onclick="openHoleSheet()">
        <div class="hole-pill-label">Hole</div>
        <div class="hole-pill-num" id="hole-num">1</div>
        <div class="hole-pill-meta">
          <div class="hole-pill-par" id="hole-par-label">Par 3</div>
          <div class="hole-pill-yds" id="hole-yds-label">155 yds</div>
        </div>
      </div>
    </div>

    <!-- Data FAB -->
    <div id="data-fab" onclick="openDataSheet()">
      <span class="fab-icon">＋</span>
      <span class="fab-label">Data</span>
    </div>

    <!-- Recorded clips indicator -->
    <div id="clips-indicator"></div>

    <!-- Distance display -->
    <div id="dist-display">
      <div class="dist-num" id="dist-num">—</div>
      <div class="dist-unit-label" id="dist-unit">yds</div>
    </div>

    <!-- Geo tag buttons -->
    <div id="geo-overlay">
      <div class="geo-tag-btn" id="ball-btn" onclick="geoTag('ball')">
        <div class="geo-tag-icon">⛳</div>
        <div class="geo-tag-info">
          <div class="geo-tag-label">Ball</div>
          <div class="geo-tag-value" id="ball-val">TAP</div>
        </div>
      </div>
      <div class="geo-tag-btn" id="pin-btn" onclick="geoTag('pin')">
        <div class="geo-tag-icon">🚩</div>
        <div class="geo-tag-info">
          <div class="geo-tag-label">Pin</div>
          <div class="geo-tag-value" id="pin-val">TAP</div>
        </div>
      </div>
    </div>

  </div><!-- /viewfinder -->

  <!-- CAMERA CONTROLS -->
  <div id="camera-controls">
    <div class="ctrl-btn" id="guides-btn" onclick="toggleGuides()">⊞</div>
    <div id="record-btn" onclick="toggleRecord()">
      <div class="rec-timer">
        <div class="rec-dot"></div>
        <span id="rec-time">00:00</span>
      </div>
      <div id="record-inner"></div>
    </div>
    <div class="ctrl-btn" onclick="showToast('📸 Photo captured')">⚡</div>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- HOLE EDIT SHEET -->
  <div id="hole-sheet-overlay" onclick="handleHoleOverlayClick(event)">
    <div id="hole-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <div class="sheet-title">Select Hole</div>
        <div class="sheet-hole-badge" id="hole-sheet-badge">Hole 1</div>
      </div>
      <div style="padding: 16px 0 0;">
        <div class="hole-grid" id="hole-grid"></div>
        <div style="padding: 16px 0 0; display: flex; gap: 8px; flex-wrap: wrap;">
          <!-- Par/yds info will render here -->
          <div id="selected-hole-info" style="font-size:13px; color:var(--text-dim); padding: 8px 0;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- DATA SHEET -->
  <div id="data-sheet-overlay" onclick="handleDataOverlayClick(event)">
    <div id="data-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <div class="sheet-title">Hole Data</div>
        <div class="sheet-hole-badge" id="data-sheet-badge">Hole 1</div>
      </div>

      <!-- Score -->
      <div class="sheet-section">
        <div class="sheet-section-label">Score</div>
        <div class="score-row">
          <div class="score-label" id="score-vs-par">Even</div>
          <div class="score-stepper">
            <div class="step-btn" onclick="adjustScore(-1)">−</div>
            <div class="score-val" id="score-val">—</div>
            <div class="step-btn" onclick="adjustScore(1)">＋</div>
          </div>
        </div>
      </div>

      <!-- Fairway -->
      <div class="sheet-section" id="fir-section">
        <div class="sheet-section-label">Fairway</div>
        <div class="tri-selector">
          <div class="tri-btn" onclick="selectFIR(this,'left')">
            <div class="tri-icon">←</div>
            <div class="tri-label">Left</div>
          </div>
          <div class="tri-btn" onclick="selectFIR(this,'hit')">
            <div class="tri-icon">✓</div>
            <div class="tri-label">Hit</div>
          </div>
          <div class="tri-btn" onclick="selectFIR(this,'right')">
            <div class="tri-icon">→</div>
            <div class="tri-label">Right</div>
          </div>
        </div>
      </div>

      <!-- GIR -->
      <div class="sheet-section">
        <div class="sheet-section-label">Green in Regulation</div>
        <div class="tri-selector">
          <div class="tri-btn" onclick="selectGIR(this,'miss')">
            <div class="tri-icon">✗</div>
            <div class="tri-label">Miss</div>
          </div>
          <div class="tri-btn" onclick="selectGIR(this,'hit')">
            <div class="tri-icon">✓</div>
            <div class="tri-label">Hit</div>
          </div>
          <div class="tri-btn" onclick="selectGIR(this,'close')">
            <div class="tri-icon">◎</div>
            <div class="tri-label">Close</div>
          </div>
        </div>
        <!-- Miss direction -->
        <div class="five-selector" id="gir-miss-dir" style="display:none;">
          <div class="tri-btn" style="padding:7px 4px;" onclick="selectGIRDir(this,'short')">
            <div class="tri-icon" style="font-size:14px;">↓</div>
            <div class="tri-label">Short</div>
          </div>
          <div class="tri-btn" style="padding:7px 4px;" onclick="selectGIRDir(this,'left')">
            <div class="tri-icon" style="font-size:14px;">←</div>
            <div class="tri-label">Left</div>
          </div>
          <div class="tri-btn" style="padding:7px 4px;" onclick="selectGIRDir(this,'long')">
            <div class="tri-icon" style="font-size:14px;">↑</div>
            <div class="tri-label">Long</div>
          </div>
          <div class="tri-btn" style="padding:7px 4px;" onclick="selectGIRDir(this,'right')">
            <div class="tri-icon" style="font-size:14px;">→</div>
            <div class="tri-label">Right</div>
          </div>
          <div class="tri-btn" style="padding:7px 4px;" onclick="selectGIRDir(this,'pin')">
            <div class="tri-icon" style="font-size:14px;">🎯</div>
            <div class="tri-label">Pin</div>
          </div>
        </div>
      </div>

      <!-- Per-shot data -->
      <div class="sheet-section" id="shot-rows-section">
        <div class="sheet-section-label">Shots Captured</div>
        <div class="shot-rows" id="shot-rows-container">
          <div style="font-size:12px; color:var(--text-muted); text-align:center; padding:8px 0;">
            No clips captured this hole yet
          </div>
        </div>
      </div>

      <button class="save-btn" onclick="saveHoleData()">Save & Continue</button>
    </div>
  </div>

</div><!-- /app -->

<script>
// ── COURSE DATA: Capitol Tees (Silver) ──
const COURSE = {
  name: 'Capitol Park Golf Course',
  tees: 'Silver',
  holes: [
    { hole:1, par:3, yards:155, hcp:13 },
    { hole:2, par:4, yards:402, hcp:9  },
    { hole:3, par:3, yards:165, hcp:5  },
    { hole:4, par:4, yards:377, hcp:1  },
    { hole:5, par:4, yards:400, hcp:3  },
    { hole:6, par:4, yards:304, hcp:17 },
    { hole:7, par:3, yards:200, hcp:11 },
    { hole:8, par:5, yards:546, hcp:15 },
    { hole:9, par:4, yards:397, hcp:7  },
  ]
};

// ── STATE ──
let currentHole = 1;
let ballTagged = false;
let pinTagged = false;
let ballCoords = null;
let pinCoords = null;
let recording = false;
let recInterval = null;
let recSeconds = 0;
let guidesOn = true;
let toastTimer = null;
let clips = {}; // clips[hole] = [{id, dist, distUnit, timestamp}]
let holeData = {}; // holeData[hole] = {score, fir, gir, girDir, shots:[{club,lie}]}
let scoreVal = null;
let firVal = null;
let girVal = null;
let girDirVal = null;

// ── INIT ──
function init() {
  buildHoleGrid();
  updateHoleDisplay();
}

// ── HOLE DISPLAY ──
function updateHoleDisplay() {
  const h = COURSE.holes[currentHole - 1];
  document.getElementById('hole-num').textContent = currentHole;
  document.getElementById('hole-par-label').textContent = 'Par ' + h.par;
  document.getElementById('hole-yds-label').textContent = h.yards + ' yds';
  document.getElementById('data-sheet-badge').textContent = 'Hole ' + currentHole;
  document.getElementById('hole-sheet-badge').textContent = 'Hole ' + currentHole;
  updateClipsIndicator();
  updateDataFab();
}

// ── HOLE GRID ──
function buildHoleGrid() {
  const grid = document.getElementById('hole-grid');
  grid.innerHTML = '';
  COURSE.holes.forEach(h => {
    const cell = document.createElement('div');
    cell.className = 'hole-cell' + (h.hole === currentHole ? ' current' : '');
    cell.innerHTML = `<div class="hole-cell-info"><span>${h.hole}</span><span class="hole-cell-par">P${h.par}</span></div>`;
    cell.onclick = () => selectHole(h.hole);
    grid.appendChild(cell);
  });
}

function selectHole(num) {
  currentHole = num;
  buildHoleGrid();
  updateHoleDisplay();
  resetGeoTags();
  const h = COURSE.holes[num - 1];
  document.getElementById('selected-hole-info').textContent =
    `Hole ${num} · Par ${h.par} · ${h.yards} yds · Hcp ${h.hcp}`;
  showToast('Hole ' + num);
  setTimeout(closeHoleSheet, 600);
}

// ── HOLE SHEET ──
function openHoleSheet() {
  buildHoleGrid();
  const h = COURSE.holes[currentHole - 1];
  document.getElementById('selected-hole-info').textContent =
    `Hole ${currentHole} · Par ${h.par} · ${h.yards} yds · Hcp ${h.hcp}`;
  document.getElementById('hole-sheet-overlay').classList.add('open');
}

function closeHoleSheet() {
  document.getElementById('hole-sheet-overlay').classList.remove('open');
}

function handleHoleOverlayClick(e) {
  if (e.target === document.getElementById('hole-sheet-overlay')) closeHoleSheet();
}

// ── DATA SHEET ──
function openDataSheet() {
  const d = holeData[currentHole] || {};
  // Reset UI
  scoreVal = d.score || null;
  firVal = d.fir || null;
  girVal = d.gir || null;
  girDirVal = d.girDir || null;

  // Score display
  updateScoreDisplay();

  // FIR - hide on par 3s
  const h = COURSE.holes[currentHole - 1];
  document.getElementById('fir-section').style.display = h.par === 3 ? 'none' : '';

  // Reset selections
  document.querySelectorAll('.tri-btn').forEach(b => b.className = 'tri-btn');
  document.getElementById('gir-miss-dir').style.display = 'none';

  // Restore saved selections
  if (firVal) {
    const firBtns = document.querySelectorAll('#fir-section .tri-btn');
    firBtns.forEach(b => {
      if (b.querySelector('.tri-label').textContent.toLowerCase() === firVal) {
        b.classList.add(firVal === 'hit' ? 'selected' : 'selected-miss');
      }
    });
  }

  // Build shot rows for captured clips
  buildShotRows();

  document.getElementById('data-sheet-overlay').classList.add('open');
}

function closeDataSheet() {
  document.getElementById('data-sheet-overlay').classList.remove('open');
}

function handleDataOverlayClick(e) {
  if (e.target === document.getElementById('data-sheet-overlay')) closeDataSheet();
}

// ── SCORE ──
function adjustScore(dir) {
  const h = COURSE.holes[currentHole - 1];
  if (scoreVal === null) scoreVal = h.par;
  scoreVal = Math.max(1, Math.min(12, scoreVal + dir));
  updateScoreDisplay();
}

function updateScoreDisplay() {
  const h = COURSE.holes[currentHole - 1];
  const el = document.getElementById('score-val');
  const label = document.getElementById('score-vs-par');

  if (scoreVal === null) {
    el.textContent = '—';
    label.textContent = 'Tap ± to enter';
    label.style.color = 'var(--text-muted)';
    return;
  }

  el.textContent = scoreVal;
  const diff = scoreVal - h.par;
  if (diff < -1) { label.textContent = 'Eagle 🦅'; label.style.color = '#ffd700'; }
  else if (diff === -1) { label.textContent = 'Birdie 🐦'; label.style.color = 'var(--green)'; }
  else if (diff === 0) { label.textContent = 'Par'; label.style.color = 'var(--text-dim)'; }
  else if (diff === 1) { label.textContent = 'Bogey'; label.style.color = 'var(--orange)'; }
  else if (diff === 2) { label.textContent = 'Double Bogey'; label.style.color = 'var(--red)'; }
  else { label.textContent = '+' + diff; label.style.color = 'var(--red)'; }
}

// ── FIR ──
function selectFIR(el, val) {
  firVal = val;
  document.querySelectorAll('#fir-section .tri-btn').forEach(b => b.className = 'tri-btn');
  el.classList.add(val === 'hit' ? 'selected' : 'selected-miss');
}

// ── GIR ──
function selectGIR(el, val) {
  girVal = val;
  document.querySelectorAll('#data-sheet .sheet-section:nth-child(4) > .tri-selector .tri-btn')
    .forEach(b => b.className = 'tri-btn');
  el.classList.add(val === 'hit' ? 'selected' : 'selected-miss');
  document.getElementById('gir-miss-dir').style.display = val === 'miss' ? 'grid' : 'none';
}

function selectGIRDir(el, val) {
  girDirVal = val;
  document.querySelectorAll('#gir-miss-dir .tri-btn').forEach(b => b.className = 'tri-btn');
  el.classList.add('selected-miss');
}

// ── SHOT ROWS ──
function buildShotRows() {
  const container = document.getElementById('shot-rows-container');
  const holeClips = clips[currentHole] || [];
  const saved = (holeData[currentHole] || {}).shots || [];

  if (holeClips.length === 0) {
    container.innerHTML = '<div style="font-size:12px; color:var(--text-muted); text-align:center; padding:8px 0;">No clips captured this hole yet</div>';
    return;
  }

  container.innerHTML = holeClips.map((clip, i) => {
    const s = saved[i] || {};
    const clubs = ['Driver','3 Wood','5 Wood','4 Iron','5 Iron','6 Iron','7 Iron','8 Iron','9 Iron','PW','GW','SW','LW','Putter'];
    const lies = ['Tee','Fairway','Rough','Bunker','Green','Penalty'];
    return `
      <div class="shot-row">
        <div class="shot-row-num">${i+1}</div>
        <div class="shot-row-fields">
          <div class="shot-row-label">Club — <span style="color:var(--orange)">${clip.dist !== '—' ? clip.dist + ' ' + clip.distUnit : 'no distance'}</span></div>
          <div class="chip-scroll" id="club-row-${i}">
            ${clubs.map(c => `<div class="chip ${s.club===c?'selected':''}" onclick="selectRowClub(${i},'${c}')">${c}</div>`).join('')}
          </div>
          <div class="shot-row-label" style="margin-top:4px;">Lie</div>
          <div class="lie-selector" id="lie-row-${i}">
            ${lies.map(l => `<div class="lie-chip ${s.lie===l?'selected':''}" onclick="selectRowLie(${i},'${l}')">${l}</div>`).join('')}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function selectRowClub(idx, club) {
  if (!holeData[currentHole]) holeData[currentHole] = {};
  if (!holeData[currentHole].shots) holeData[currentHole].shots = [];
  if (!holeData[currentHole].shots[idx]) holeData[currentHole].shots[idx] = {};
  holeData[currentHole].shots[idx].club = club;
  document.querySelectorAll(`#club-row-${idx} .chip`).forEach(c => {
    c.classList.toggle('selected', c.textContent === club);
  });
}

function selectRowLie(idx, lie) {
  if (!holeData[currentHole]) holeData[currentHole] = {};
  if (!holeData[currentHole].shots) holeData[currentHole].shots = [];
  if (!holeData[currentHole].shots[idx]) holeData[currentHole].shots[idx] = {};
  holeData[currentHole].shots[idx].lie = lie;
  document.querySelectorAll(`#lie-row-${idx} .lie-chip`).forEach(c => {
    c.classList.toggle('selected', c.textContent === lie);
  });
}

// ── SAVE HOLE DATA ──
function saveHoleData() {
  if (!holeData[currentHole]) holeData[currentHole] = {};
  holeData[currentHole].score = scoreVal;
  holeData[currentHole].fir = firVal;
  holeData[currentHole].gir = girVal;
  holeData[currentHole].girDir = girDirVal;
  updateDataFab();
  closeDataSheet();
  showToast('✅ Hole ' + currentHole + ' saved');

  // Auto-advance to next hole
  if (currentHole < 9) {
    setTimeout(() => {
      currentHole++;
      updateHoleDisplay();
      resetGeoTags();
      showToast('→ Hole ' + currentHole);
    }, 1200);
  }
}

function updateDataFab() {
  const fab = document.getElementById('data-fab');
  const hasData = holeData[currentHole] && (
    holeData[currentHole].score !== null ||
    holeData[currentHole].fir ||
    holeData[currentHole].gir
  );
  fab.classList.toggle('has-data', !!hasData);
}

// ── GEO TAG ──
function geoTag(type) {
  const btn = document.getElementById(type === 'ball' ? 'ball-btn' : 'pin-btn');
  btn.classList.add('pulse-once');
  setTimeout(() => btn.classList.remove('pulse-once'), 700);

  const lat = (38.5836 + (Math.random()-0.5)*0.002).toFixed(5);
  const lng = (-121.3766 + (Math.random()-0.5)*0.002).toFixed(5);

  if (type === 'ball') {
    ballTagged = true;
    ballCoords = {lat, lng};
    btn.classList.add('tagged');
    document.getElementById('ball-val').textContent = lat.slice(-5);
    showToast('📍 Ball tagged');
  } else {
    pinTagged = true;
    pinCoords = {lat, lng};
    btn.classList.add('tagged');
    document.getElementById('pin-val').textContent = lat.slice(-5);
    showToast('🚩 Pin tagged');
  }

  if (ballTagged && pinTagged) {
    const dist = Math.floor(80 + Math.random() * 220);
    const unit = 'yds';
    document.getElementById('dist-num').textContent = dist;
    document.getElementById('dist-unit').textContent = unit;
    document.getElementById('dist-display').classList.add('visible');
  }
}

function resetGeoTags() {
  ballTagged = false;
  pinTagged = false;
  ballCoords = null;
  pinCoords = null;
  document.getElementById('ball-btn').classList.remove('tagged');
  document.getElementById('pin-btn').classList.remove('tagged');
  document.getElementById('ball-val').textContent = 'TAP';
  document.getElementById('pin-val').textContent = 'TAP';
  document.getElementById('dist-display').classList.remove('visible');
}

// ── RECORD ──
function toggleRecord() {
  const btn = document.getElementById('record-btn');
  recording = !recording;

  if (recording) {
    btn.classList.add('recording');
    recSeconds = 0;
    recInterval = setInterval(() => {
      recSeconds++;
      const m = String(Math.floor(recSeconds/60)).padStart(2,'0');
      const s = String(recSeconds%60).padStart(2,'0');
      document.getElementById('rec-time').textContent = m+':'+s;
    }, 1000);
    showToast('🔴 Recording');
  } else {
    btn.classList.remove('recording');
    clearInterval(recInterval);

    // Save clip
    const dist = ballTagged && pinTagged
      ? document.getElementById('dist-num').textContent
      : '—';
    const distUnit = document.getElementById('dist-unit').textContent;

    if (!clips[currentHole]) clips[currentHole] = [];
    clips[currentHole].push({
      id: Date.now(),
      dist,
      distUnit,
      duration: document.getElementById('rec-time').textContent,
      timestamp: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
    });

    updateClipsIndicator();
    showToast('✅ Clip saved · ' + document.getElementById('rec-time').textContent);
    resetGeoTags();
  }
}

// ── CLIPS INDICATOR ──
function updateClipsIndicator() {
  const indicator = document.getElementById('clips-indicator');
  const holeClips = clips[currentHole] || [];
  indicator.innerHTML = holeClips.map(() => '<div class="clip-dot"></div>').join('');
}

// ── GUIDES ──
function toggleGuides() {
  guidesOn = !guidesOn;
  document.getElementById('guides').style.opacity = guidesOn ? '1' : '0';
  const btn = document.getElementById('guides-btn');
  btn.classList.toggle('active-btn', guidesOn);
  showToast(guidesOn ? '⊞ Guides on' : '⊟ Guides off');
}

// ── TOAST ──
function showToast(msg, warn) {
  const t = document.getElementById('toast');
  if (toastTimer) clearTimeout(toastTimer);
  t.textContent = msg;
  t.className = 'show' + (warn ? ' warn' : '');
  toastTimer = setTimeout(() => t.className = '', 2200);
}

init();
</script>
</body>
</html>
